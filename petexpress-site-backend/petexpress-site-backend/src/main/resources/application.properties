spring.application.name=petexpress-site-backend

spring.datasource.url=jdbc:sqlite:petexpress.db
spring.datasource.driver-class-name=org.sqlite.JDBC

spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

server.port=${PORT:8082}

app.email.enabled=${APP_EMAIL_ENABLED:false}
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.from=${SPRING_MAIL_FROM:no-reply@petexpress.com}

# Mercado Pago
# Set these values in your local environment. Do not commit real credentials.
mercadopago.access-token=${MERCADOPAGO_ACCESS_TOKEN:APP_USR-690590767684818-042905-c98708c38abe6870739f03a2ab22fc3a-3367643984}
mercadopago.public-key=${MERCADOPAGO_PUBLIC_KEY:APP_USR-8059b69a-345f-4492-a4a2-1c9be1e67056}
# Use sandbox by default for local testing. Set MERCADOPAGO_CHECKOUT_MODE=production when publishing.
mercadopago.checkout-mode=${MERCADOPAGO_CHECKOUT_MODE:production}
app.base-url=${APP_BASE_URL:http://localhost:8082}
app.jwt-secret=${JWT_SECRET:petexpress-local-dev-secret-change-me}
app.jwt-expiration-minutes=${JWT_EXPIRATION_MINUTES:480}

# Logging: write to a local file so we can inspect server errors
logging.file.name=logs/petexpress.log
logging.level.root=INFO
logging.level.com.petexpress=DEBUG
