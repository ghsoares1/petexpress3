<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagamento Não Aprovado - PetExpress</title>
  <link rel="stylesheet" href="style-minha-conta.css" />
</head>
<body>
  <header class="account-header">
    <a href="index.html" class="brand-link">
      <img src="img/lg.png" alt="Logo PetExpress" class="logo" />
    </a>
    <h1>Pagamento não aprovado</h1>
  </header>

  <main class="account-page">
    <section class="account-card">
      <div class="account-card-header">
        <div>
          <span class="eyebrow">Falha</span>
          <h2>Pagamento não aprovado</h2>
        </div>
      </div>
      <p class="result-message">Não foi possível concluir o pagamento. Tente novamente ou verifique seus dados.</p>
      <div class="form-actions">
        <a href="checkout.html" class="btn-primary">Voltar ao checkout</a>
      </div>
    </section>
  </main>
</body>
</html>
