<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagamento Pendente - PetExpress</title>
  <link rel="stylesheet" href="style-minha-conta.css" />
</head>
<body>
  <header class="account-header">
    <a href="index.html" class="brand-link">
      <img src="img/lg.png" alt="Logo PetExpress" class="logo" />
    </a>
    <h1>Pagamento pendente</h1>
  </header>

  <main class="account-page">
    <section class="account-card">
      <div class="account-card-header">
        <div>
          <span class="eyebrow">Aguardando</span>
          <h2>Pagamento pendente</h2>
        </div>
      </div>
      <p class="result-message">Seu pagamento está em análise. Assim que for confirmado, enviaremos a atualização.</p>
      <div class="form-actions">
        <a href="index.html" class="btn-primary">Voltar para a loja</a>
      </div>
    </section>
  </main>
</body>
</html>
